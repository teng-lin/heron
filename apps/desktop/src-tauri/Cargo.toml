[package]
name = "heron-desktop"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
build = "build.rs"

[lib]
name = "heron_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "heron-desktop"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }
dirs = "5"
heron-types = { workspace = true }
# `heron_status::audio_available` calls `heron_audio::audio_capture_available()`
# to derive the field from a real capability probe (cpal default input
# device + cfg-gated cidre process tap symbols) instead of the v0
# hardcode. The probe is sub-millisecond on macOS and returns `false`
# unconditionally off-Apple — see `crates/heron-audio/src/lib.rs`.
heron-audio = { workspace = true }

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true

[package]
name = "heron-desktop"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
build = "build.rs"

[lib]
name = "heron_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "heron-desktop"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# `tray-icon` enables the `tauri::tray::*` API used by phase 64's
# menubar tray; `image-png` lets `tauri::image::Image::from_bytes`
# decode the PNG files in `icons/tray/` (without the feature, the
# decoder is compiled out and `from_bytes` returns a runtime error).
# `protocol-asset` enables the built-in `asset:` protocol the Â§15.3
# Review playback bar uses to stream the recorded m4a/wav from disk
# into the webview's <audio> element via `convertFileSrc()` â€” without
# the feature, `assetProtocol.enable: true` in `tauri.conf.json` is
# rejected at build time.
tauri = { version = "2", features = ["tray-icon", "image-png", "protocol-asset"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }
dirs = "5"
heron-types = { workspace = true }
# `heron_status::audio_available` calls `heron_audio::audio_capture_available()`
# to derive the field from a real capability probe (cpal default input
# device + cfg-gated cidre process tap symbols) instead of the v0
# hardcode. The probe is sub-millisecond on macOS and returns `false`
# unconditionally off-Apple â€” see `crates/heron-audio/src/lib.rs`.
#
# Onboarding probes (`onboarding.rs`) reuse `heron-audio` plus call into
# `heron-zoom`, `heron-vault`, and `heron-speech` to exercise the real
# mic / system-audio / Accessibility / Calendar / WhisperKit-model
# paths instead of returning hardcoded `Skipped`.
heron-audio = { workspace = true }
heron-zoom = { workspace = true }
heron-vault = { workspace = true }
# Onboarding step 5 (`heron_download_model`) drives the real WhisperKit
# fetch via `WhisperKitBackend::ensure_model`, forwarding 0..1 progress
# ticks onto a Tauri event stream the renderer renders as a progress
# bar. Off-Apple, `build_backend("whisperkit")` returns the stub which
# resolves to `SttError::NotYetImplemented` â€” the command surfaces that
# as a structured failure and the wizard's Test step copy explains the
# platform gating.
heron-speech = { workspace = true }
# Phase 67 (PR-Îµ): the Re-summarize button in the Review UI calls
# `heron_cli::summarize::re_summarize_in_vault`, which threads the
# Â§10.5 ID-preservation contract + Â§10.3 merge through
# `heron_vault::VaultWriter::re_summarize`. Pulling in `heron-llm`
# alongside lets the Tauri command resolve a live `Summarizer` via
# `select_summarizer(Preference::Auto)`.
heron-cli = { workspace = true }
# Gap #6: surface `Doctor::run_runtime_checks` (ONNX / Zoom / keychain
# ACL / network reachability) to the onboarding wizard via the
# `heron_run_runtime_checks` Tauri command. The doctor crate already
# carries its own probe deps (`reqwest`, `sysinfo`, `dirs`); we only
# pull in the public faĂ§ade here.
heron-doctor = { workspace = true }
heron-llm = { workspace = true }
# Phase 82: in-process bus + replay cache so future local publishers
# (heron-cli v2 commands once they delegate through here, recording
# state-machine probes, etc.) can broadcast envelopes without going
# through herond's HTTP loopback. `LocalSessionOrchestrator` brings
# the substrate; `TauriEventSink` re-emits onto Tauri IPC for the
# WebView. Today the only consumer is the sink â€” there are no in-
# process publishers yet, so the wiring is dormant. Cross-process
# domain events (the published OpenAPI surface) still flow over
# herond's HTTP/SSE; this is the in-process side.
heron-event = { workspace = true }
heron-event-tauri = { workspace = true }
# Issue #223: install the process-global Prometheus recorder when
# the desktop launches the embedded daemon. Idempotent installer
# means a desktop launch can co-exist with a separate `herond`
# binary without fighting over the global slot.
heron-metrics = { workspace = true }
heron-orchestrator = { workspace = true }
heron-session = { workspace = true }
# Gap #7: the desktop shell launches `herond` in-process (rather than
# as a packaged sidecar binary) so the daemon shares a Tokio runtime,
# the in-process `LocalSessionOrchestrator`, and an unambiguous
# shutdown signal with the Tauri side. `herond::build_app` builds the
# axum router; `herond::auth::load_or_mint` brings in the same bearer
# token surface main.rs uses, so a CLI talking to `127.0.0.1:7384` and
# the desktop process see one identical token.
herond = { workspace = true }
# `axum::serve` + `tokio::net::TcpListener` are the runtime-side glue
# the in-process daemon needs (`herond::build_app` returns a router but
# does not bind). The `axum-macros` feature is not required.
axum = { workspace = true }
# `heron_daemon_status` and `test_daemon` probe the daemon's
# `/v1/health` over loopback. `default-features = false` skips the
# `default-tls` feature (which would pull `native-tls` â†’ OpenSSL on
# macOS); we re-enable `rustls-tls` even though the probe target is
# always plain `http://` so a future migration to https loopback
# (e.g. mTLS for a paired companion app) doesn't need a Cargo edit.
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
# UI revamp PR 4: the SSE bridge in `events_bridge.rs` parses
# `reqwest::Response::bytes_stream()` line-by-line; `StreamExt::next`
# is the iteration combinator. Workspace pin keeps the version aligned
# with `heron-realtime` and the rest of the streaming surface.
futures-util = { workspace = true }
# Probes that hit TCC (mic, calendar) need `spawn_blocking`, and the
# tap probe is async â€” pull `tokio` in for the shared runtime. The
# `rt` + `time` features are the minimum the probes need (timeout +
# blocking pool); the desktop binary itself runs on Tauri's own loop.
tokio = { workspace = true }
# Calendar probe builds a `[start, end)` window via `chrono` and
# threads it through `heron_vault::calendar::calendar_read_one_shot`.
chrono = { workspace = true }
# Native file/directory picker for the Settings pane vault-path field
# (Â§16.1). The frontend calls `@tauri-apps/plugin-dialog::open({ directory:
# true })`, which routes to this plugin's IPC handler. Pinned to the
# matching JS package version on the renderer side.
tauri-plugin-dialog = "2.7.0"
# Phase 68 (PR-Î¶): system-wide hotkey for Start/Stop Recording
# (Â§16.1 Hotkey tab). The plugin exposes a `GlobalShortcut` manager
# we wrap behind the `heron_register_hotkey` / `heron_check_hotkey`
# / `heron_unregister_hotkey` commands. Conflict detection works by
# attempting the OS-level register and observing whether the platform's
# global-hotkey daemon already owns the chord â€” `is_registered` only
# reports per-app state, which is why we also try-register the chord
# in `heron_check_hotkey` and unregister immediately on success.
tauri-plugin-global-shortcut = "2.3.1"
# Phase 75 (PR-Î˝): native macOS notification surface for the tray's
# "Open last noteâ€¦" â†’ "no notes yet" path. Replaces the previous
# `nav:no_last_note` Sonner toast so the user gets a real system
# notification (Notification Center entry, banner, badge) instead of an
# in-window toast that disappears with the focused window. The plugin
# is dual-licensed MIT/Apache-2.0 (already covered by `deny.toml`'s
# allowlist) and is the canonical Tauri 2 way to talk to NSUserNotifi-
# cationCenter / mac-notifications-rs without us hand-rolling FFI.
tauri-plugin-notification = "2.3.3"
# Phase 73 (PR-Î»): the pre-flight disk-space gate calls `statvfs(2)` on
# the cache root to ask the OS how much free space the volume has, then
# compares against `Settings::min_free_disk_mib`. `libc` already sits
# in the transitive dep graph (cidre + cpal both pull it in); surfacing
# it here keeps the binding obvious. We use the raw FFI rather than the
# `nix` crate or `sysinfo` because the call site is one syscall â€” a
# bigger crate would dwarf the value it added.
libc = "0.2"
# `tracing` already lives in the transitive dep graph via `heron-zoom`;
# surfacing it here lets `lib.rs` log the hotkey-fired stub line without
# pulling a second log crate. The `tracing-subscriber` set up by the
# binary's `main.rs` (or by tests) routes the line to stderr.
tracing = { workspace = true }

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true }
# Issue #185 IPC contract test: parses `tauri::generate_handler![â€¦]` in
# `lib.rs` so the parity check against `invoke.ts::HeronCommands` runs on
# the macro args directly rather than scraping with a regex (catches
# rename/path drift like `meetings::heron_get_meeting` â†”
# `crate::meetings::heron_get_meeting` correctly). `full` enables expr
# parsing; `visit` enables the recursive AST walker the test uses to
# find the macro inside `pub fn run`'s body without hand-rolling a
# descent through every nested expression variant.
syn = { version = "2", features = ["full", "visit"] }
# Day 8-10 action_items tests build a `Frontmatter` literal whose `extra`
# field is a `serde_yaml::Mapping`. Pinned at the workspace level so a
# version bump touches one file. Production code in `lib.rs` only sees
# the type via `heron_vault::Frontmatter`'s public surface; surfacing
# `serde_yaml` here is dev-only.
serde_yaml = { workspace = true }
# `disk.rs` mtime-based purge tests need to backdate created files.
# `filetime` is the standard knob for setting `mtime` portably; pulling
# it in only as a dev-dep keeps it out of the release binary.
filetime = "0.2"
# Phase 82 `event_bus` tests use `tauri::test::mock_app()` to build a
# `MockRuntime`-backed `AppHandle` for in-process listener assertions.
# The `test` feature is opt-in upstream because it pulls Tauri's mock
# runtime; gate it to dev-deps so the production binary stays slim.
tauri = { version = "2", features = ["test"] }
# Multi-subscriber fan-out test in `event_bus` exercises a Tauri IPC
# sink AND an `SseEventSink` sharing the same orchestrator bus to pin
# Invariant 13 (transports are projections of one canonical bus) under
# realistic v2-frontend conditions. Production code never instantiates
# `SseEventSink` from the desktop crate â€” that's herond's job â€” so the
# adapter stays a dev-dep.
heron-event-http = { workspace = true }

# Issue #186 IPC payload snapshot tests. `insta` pins the JSON shape of
# the high-traffic Tauri command request / response payloads so a future
# `#[serde(rename = "...")]` (or any serde-shape regression) lands as a
# visible snapshot diff during review. Snapshots live under
# `tests/snapshots/`; the `cargo insta review` flow updates them after a
# deliberate wire-format change. The `json` feature pulls in
# `assert_json_snapshot!` (it lives behind that feature flag, not in the
# base crate).
insta = { version = "1.39", features = ["json"] }

# macOS Keychain integration (PR-Î¸ / phase 70). The crate is broadly
# used (rustls, reqwest, cargo) and dual-licensed MIT/Apache-2.0 (already
# in `deny.toml`'s allowlist via the existing transitive dep on it). The
# `cfg(target_os = "macos")` gate keeps Linux/Windows builds clean â€” the
# `keychain` module ships a stub for those platforms.
[target.'cfg(target_os = "macos")'.dependencies]
security-framework = "3"

[features]
# Opt-in flag for tests that hit the real macOS login keychain. Off by
# default so CI (where the login keychain is locked) and routine
# developer test runs don't spawn keychain unlock prompts. Enable with
# `cargo test -p heron-desktop --features test_real_keychain`.
default = []
test_real_keychain = []

[lints]
workspace = true

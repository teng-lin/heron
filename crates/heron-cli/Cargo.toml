[package]
name = "heron-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[[bin]]
name = "heron"
path = "src/main.rs"

[lib]
name = "heron_cli"
path = "src/lib.rs"

[dependencies]
heron-types = { workspace = true }
heron-audio = { workspace = true }
heron-speech = { workspace = true }
heron-zoom = { workspace = true }
heron-llm = { workspace = true }
# heron-vault is intentionally NOT listed here: linking it pulls in
# the EventKit Swift static lib + libswift_Concurrency, and Cargo
# does not propagate the build-script rpath to test binaries of
# dependent crates (only to the crate that emits the directive).
# The orchestrator skeleton doesn't call the vault writer yet; we'll
# re-add the dep in the phase that wires `run()` to actually write.
clap = { version = "4.5", features = ["derive", "env"] }
anyhow = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
tempfile = "3"

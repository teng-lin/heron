name: rust

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Parallel split: `lint` (fmt + clippy) and `test` (cargo test + release
  # build) used to run sequentially in one job. Their compile artifacts
  # barely overlap (clippy runs in `check` mode, `cargo test` in `test`
  # mode — different `target/` subdirs), so the sequential layout wasn't
  # actually sharing much work. Splitting lets the slower of the two
  # define wall-clock instead of their sum. Each job carries its own
  # rust-cache `shared-key` so the two caches don't fight for the same
  # slot — `lint` stores `check` artifacts; `test` stores `test`/`release`
  # artifacts.
  lint:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Reads rust-toolchain.toml so CI matches the pinned local toolchain
      # (channel + components). No need to specify version here.
      - name: install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: cargo registry + target cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint

      # WhisperKit's transitive swift-jinja requires swift-tools-version 6.0+,
      # which means Xcode 16+. macos-14's default is Xcode 15.4 (Swift 5.10);
      # 16.2 is preinstalled on the runner image, just not selected by default.
      - name: select Xcode 16 (Swift 6 toolchain)
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      # `webrtc-audio-processing` 2.x with the `bundled` feature compiles
      # the upstream C++ source via meson + ninja. macos-14 runners ship
      # neither by default; install via Homebrew (already on the runner).
      # See `crates/heron-audio/Cargo.toml` for the version-pin rationale.
      - name: install webrtc-audio-processing build deps (meson + ninja)
        run: brew install meson ninja

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings -D clippy::unwrap_used -D clippy::expect_used

  test:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # `cache: false` disables setup-rust-toolchain's bundled
      # rust-cache step so the only cache in effect is the explicit
      # one below. Without this, the action restores a separate
      # `v0-rust-test-…` cache layer that bypasses our `shared-key`
      # bump and re-introduces a stale `target/` carrying
      # sherpa-rs-sys's build-script output without the prebuilt
      # dylibs (see the `test-sherpa` rationale below).
      - name: install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      # The `test-sherpa` shared-key busts the `test` cache that was
      # populated before sherpa-rs-sys joined the workspace. The cached
      # `target/` carried sherpa-rs-sys's build-script output but the
      # prebuilt dylibs live in `~/Library/Caches/sherpa-rs/`, which
      # isn't part of the default rust-cache scope. Adding the cache
      # directory here keeps the prebuilt onnxruntime + sherpa-onnx
      # dylibs alongside `target/` so subsequent runs avoid re-downloading.
      - name: cargo registry + target cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-sherpa
          cache-directories: |
            ~/Library/Caches/sherpa-rs

      - name: select Xcode 16 (Swift 6 toolchain)
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      # `webrtc-audio-processing` 2.x with the `bundled` feature
      # compiles upstream C++ via meson + ninja. macos-14 ships
      # neither by default. The `lint` job has the same step; this
      # mirrors it so a cold-cache `test` job (no rust-cache hit on
      # `target/`) can build the sys crate from scratch.
      - name: install webrtc-audio-processing build deps (meson + ninja)
        run: brew install meson ninja

      # `sherpa-rs-sys`'s build script downloads onnxruntime + sherpa-onnx
      # dylibs into `~/Library/Caches/sherpa-rs/<target>/<sha>/<dist>/lib/`
      # and hard-links them into `target/<profile>/deps/`. The test binary
      # references `@rpath/libonnxruntime.1.17.1.dylib`, but cargo doesn't
      # set an rpath into `target/debug/deps/`, so dyld relies on its
      # default fallback search list. When `Swatinem/rust-cache@v2`
      # restores `target/`, the dylibs hard-linked into `target/debug/deps/`
      # are not always re-materialised (they live across two separate
      # `cache-directories` archives, so cross-archive hardlinks can't be
      # preserved). On cache hit the sherpa-rs-sys build script's
      # fingerprint is fresh, so it never re-runs the copy loop in its
      # `build.rs`, leaving `target/debug/deps/libonnxruntime.*.dylib`
      # missing — the dyld error we keep hitting on CI.
      #
      # Build first to populate the cache directory, then point dyld at
      # both `target/debug/deps` (in case the build script *did* run) and
      # the cache dir (the always-present source of truth).
      - name: cargo build (workspace + tests)
        run: cargo build --workspace --tests

      - name: cargo test
        run: |
          set -euo pipefail
          roots=()
          for root in "$HOME/Library/Caches/sherpa-rs" target/debug; do
            [ -d "$root" ] && roots+=("$root")
          done
          dirs=""
          if [ "${#roots[@]}" -gt 0 ]; then
            dirs=$(find "${roots[@]}" -maxdepth 6 -name 'libonnxruntime*.dylib' \
              -exec dirname {} \; 2>/dev/null | sort -u | paste -sd ':' -)
          fi
          if [ -z "$dirs" ]; then
            echo "::error::no libonnxruntime*.dylib found under sherpa-rs cache or target/debug" >&2
            exit 1
          fi
          echo "dyld fallback dirs: $dirs"
          DYLD_FALLBACK_LIBRARY_PATH="${dirs}:${DYLD_FALLBACK_LIBRARY_PATH:-}" \
            cargo test --workspace

      - name: cargo build --release
        run: cargo build --workspace --release

  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Run all four checks (advisories + bans + licenses +
          # sources) per deny.toml. The action positions
          # `arguments` BEFORE the subcommand, so flags like
          # `--hide-inclusion-graph` (which only the subcommand
          # accepts) can't be passed via `arguments` here. The full
          # graph in CI logs is acceptable; failures are rare.
          command: check
          rust-version: stable

name: rust

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Reads rust-toolchain.toml so CI matches the pinned local toolchain
      # (channel + components). No need to specify version here.
      - name: install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: cargo registry + target cache
        uses: Swatinem/rust-cache@v2

      # WhisperKit's transitive swift-jinja requires swift-tools-version 6.0+,
      # which means Xcode 16+. macos-14's default is Xcode 15.4 (Swift 5.10);
      # 16.2 is preinstalled on the runner image, just not selected by default.
      - name: select Xcode 16 (Swift 6 toolchain)
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings -D clippy::unwrap_used -D clippy::expect_used

      # nextest runs unit + integration tests in parallel and is ~2×
      # faster than `cargo test` on multi-crate workspaces. Install
      # via the precompiled-binary action (~3 s) instead of
      # `cargo install` (~30–60 s).
      - name: install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: cargo nextest run
        run: cargo nextest run --workspace

      # nextest deliberately does not run doc-tests
      # (https://nexte.st/book/usage.html#filtering-tests). Keep a
      # vanilla `cargo test --doc` so the doc-test pipeline still
      # gates merges; today there are zero doc-tests so this step
      # is dominated by per-crate compile-cache hits.
      - name: cargo test --doc
        run: cargo test --workspace --doc

      # Release builds re-compile the entire workspace in optimized
      # mode after the tests already proved correctness. Keep that
      # gate on push-to-main only — optimization-only regressions
      # are rare and a main failure is cheap to revert. PR runs save
      # ~40 s by skipping this step.
      - name: cargo build --release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cargo build --workspace --release

  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Run all four checks (advisories + bans + licenses +
          # sources) per deny.toml. The action positions
          # `arguments` BEFORE the subcommand, so flags like
          # `--hide-inclusion-graph` (which only the subcommand
          # accepts) can't be passed via `arguments` here. The full
          # graph in CI logs is acceptable; failures are rare.
          command: check
          rust-version: stable
